version: '3.8'

services:
  app:
    build: .
    container_name: nanolink-app
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/nanolink
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    networks:
      - nanolink-network

  postgres:
    image: postgres:16
    container_name: nanolink-db
    environment:
      POSTGRES_DB: nanolink
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - nanolink-network

  redis:
    image: redis:7-alpine
    container_name: nanolink-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - nanolink-network
    command: redis-server --appendonly yes

volumes:
  postgres-data:
  redis-data:

networks:
  nanolink-network:
    driver: bridge