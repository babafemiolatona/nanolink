version: '3.8'

services:
  app:
    build: .
    container_name: nanolink-app
    ports:
      - "${SERVER_PORT:-8080}:8080"
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      APP_BASE_URL: ${APP_BASE_URL}
    networks:
      - nanolink-network

  postgres:
    image: postgres:16
    container_name: nanolink-db
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - nanolink-network

  redis:
    image: redis:7-alpine
    container_name: nanolink-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - nanolink-network
    command: redis-server --appendonly yes

volumes:
  postgres-data:
  redis-data:

networks:
  nanolink-network:
    driver: bridge