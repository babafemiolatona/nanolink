version: '3.8'

services:
  app:
    build: .
    container_name: nanolink-app
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/nanolink
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    networks:
      - nanolink-network

  postgres:
    image: postgres:16
    container_name: nanolink-db
    environment:
      POSTGRES_DB: nanolink
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - nanolink-network

volumes:
  postgres-data:

networks:
  nanolink-network:
    driver: bridge